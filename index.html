<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Lavishly+Yours&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background-color: AliceBlue;
}

/* Style the header */
.header {
  background-image: url('/WebsiteImages/falledits-10.jpg');
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  padding: 50px;
  text-align: center;
  font-family: "Boldonse", system-ui;
  font-weight: 500;
  font-style: normal;
  font-size: 20px;
}

.header a {
  color: AliceBlue;
  text-decoration: none;
}

.header a:hover {
  color: AliceBLue;
  text-decoration: none;
}

/* Style the top navigation bar */
.topnav {
  background-color: DarkSlateGrey;
  padding: 16px;
  align-items: center;
}

.nav_links {
  list-style: none;
}

.nav_links li {
  display: inline-block;
  padding: 0px 20px;
}
  
/* Style the topnav links */
.topnav a {
  color: AliceBlue;
  font-size: 100%; 
  text-align: center;
  text-decoration: none;
  font-family: monospace, Verdana, "Lucida Console";
  padding: 16px;
}

/* Change color on hover */
.topnav a:hover {
  background-color: SeaGreen;
  color: white;
  font-size: 100%;
  padding: 16px;
}

div.gallery {
  width: 30px;
  margin: 20px;
  padding: 15px;
  display: inline-block;
}

div.gallery img {
  width: 40%;
  height: auto;
}

div.desc {
  padding: 15px;
  text-align: left;
}

aside {
  width: 30px;
  padding: 30px;
  text-align: right;
  font-family: monospace, Verdana, "Lucida Console";
  font-size: 20px;
  display: inline-block;
}
</style>
</head>
<body>

<div class="header">
  <h1 style="color:AliceBlue;">
    <a href="index.html">Veronica Pruneda</h1>
</div>

<div class="topnav">
  <ul class="nav_links">
    <li><a href="Works.html">Past and Present</a></li>
    <li><a href="Contacts.html">Contact</a></li>
</div>

<aside>
<p>Using my environment and my body as material, I am drawn to working with nature and the female figure.</p>
</aside>
  
<div class="gallery">

  </a>

</div>
  
<div class="gallery">
